<div class="d-flex vh-100">
  <!-- Left Sidebar -->
  <nav #leftSidebar class="bg-light border-end p-3 overflow-auto" style="width: 250px; max-height: 100vh;">
    <div *ngFor="let category of categories" class="mb-3">
      <h6 class="text-secondary">{{ category.name }}</h6>
      <ul class="list-group list-group-flush">
        <li *ngFor="let product of category.products" class="list-group-item" [class.active]="activeProduct === product.id">
          <a href="#" class="text-decoration-none" id = "product.id" (click)="scrollTo($event, product.id)">{{ product.name }}</a>
        </li>
      </ul>
    </div>
  </nav>

  <!-- Right Content -->
  <div #rightContent class="flex-fill p-4 overflow-auto" style="max-height: 100vh;" (scroll)="syncLeftRightScroll()">
    <div *ngFor="let product of allProducts" [id]="product.id" class="mb-4 p-3 border rounded product">
      <h4>{{ product.name }}</h4>
      <p>{{ product.description }}</p>
    </div>
  </div>
</div>
